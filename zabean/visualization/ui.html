<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zabean</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    /* =========================================================================
       Design tokens
       ========================================================================= */
    :root {
      --color-black:        #0a0a0a;
      --color-navy-darkest: #0d1117;
      --color-navy-dark:    #161b22;
      --color-navy-mid:     #1c2333;
      --color-navy-light:   #2d3748;
      --color-gray-dark:    #4a5568;
      --color-gray-mid:     #718096;
      --color-gray-light:   #a0aec0;
      --color-white:        #f7f8fa;
      --color-white-dim:    #c8d0dc;
      --color-maize:        #e8c84a;
      --color-maize-dim:    #b8962a;
      --color-maize-dark:   #4a3c10;
      --color-amber:        #c47a1e;
      --color-amber-dim:    #7a4c10;
      --color-amber-dark:   #3a2008;
      --color-green:        #2d6a4f;
      --color-green-bright: #52b788;
      --color-red:          #c0392b;
      --color-red-bright:   #e74c3c;

      --font-mono: 'SF Mono', 'Monaco', 'Cascadia Code', 'Fira Code', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* =========================================================================
       Reset and base
       ========================================================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--color-navy-darkest);
      color: var(--color-white-dim);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* =========================================================================
       Custom scrollbars
       ========================================================================= */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--color-gray-dark);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-gray-mid);
    }

    /* =========================================================================
       App shell
       ========================================================================= */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* =========================================================================
       Title bar
       ========================================================================= */
    #title-bar {
      height: 40px;
      flex-shrink: 0;
      background: var(--color-black);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    .wordmark {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--color-maize);
      letter-spacing: 0.02em;
    }

    /* =========================================================================
       Workspace — three-panel area between title bar and status bar
       ========================================================================= */
    #workspace {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* =========================================================================
       Panel shared styles
       ========================================================================= */
    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    .panel-header {
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      border-bottom: 1px solid var(--color-navy-light);
    }

    .panel-title {
      font-family: var(--font-sans);
      font-size: 10px;
      font-variant: small-caps;
      letter-spacing: 0.08em;
      color: var(--color-gray-light);
      user-select: none;
    }

    .panel-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.35);
    }

    /* =========================================================================
       Top panel — "the stage"
       ========================================================================= */
    #top-panel {
      background: var(--color-navy-dark);
    }

    #top-panel .panel-header {
      background: var(--color-navy-darkest);
    }

    #top-panel .panel-body {
      background: var(--color-navy-dark);
    }

    /* =========================================================================
       Bottom area
       ========================================================================= */
    #bottom-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* =========================================================================
       Bottom left panel — file list
       ========================================================================= */
    #bottom-left {
      background: var(--color-navy-mid);
    }

    #bottom-left .panel-header {
      background: var(--color-navy-dark);
    }

    #bottom-left .panel-body {
      background: var(--color-navy-mid);
    }

    /* Search input */
    .search-input {
      height: 22px;
      background: var(--color-navy-mid);
      border: 1px solid var(--color-navy-light);
      border-radius: 3px;
      color: var(--color-gray-light);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 0 8px;
      width: 148px;
      outline: none;
      transition: border-color 0.1s;
    }

    .search-input::placeholder {
      color: var(--color-gray-dark);
    }

    .search-input:not(:disabled):focus {
      border-color: var(--color-gray-mid);
    }

    .search-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* =========================================================================
       Bottom right panel — detail
       ========================================================================= */
    #bottom-right {
      flex: 1;
      min-width: 0;
      background: var(--color-navy-mid);
    }

    #bottom-right .panel-header {
      background: var(--color-navy-dark);
    }

    #bottom-right .panel-body {
      background: var(--color-navy-mid);
    }

    /* =========================================================================
       Resize bars
       ========================================================================= */
    .resize-bar {
      flex-shrink: 0;
      background: var(--color-navy-light);
      position: relative;
      z-index: 10;
      transition: background 0.1s;
    }

    .resize-bar::after {
      content: '';
      position: absolute;
      inset: 0;
    }

    .resize-h {
      height: 4px;
      cursor: row-resize;
      width: 100%;
    }

    .resize-h::after {
      top: -4px;
      bottom: -4px;
    }

    .resize-v {
      width: 4px;
      cursor: col-resize;
      height: 100%;
    }

    .resize-v::after {
      left: -4px;
      right: -4px;
    }

    .resize-bar:hover,
    .resize-bar.dragging {
      background: var(--color-maize);
    }

    /* =========================================================================
       View mode selector
       ========================================================================= */
    .view-mode-selector {
      display: flex;
    }

    .view-btn {
      height: 24px;
      background: var(--color-navy-dark);
      color: var(--color-gray-mid);
      border: 1px solid var(--color-navy-light);
      font-family: var(--font-mono);
      font-size: 10px;
      font-variant: small-caps;
      letter-spacing: 0.04em;
      padding: 4px 6px;
      border-radius: 0;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      line-height: 1;
      transition: background 0.1s, color 0.1s;
    }

    .view-btn:first-child {
      border-radius: 3px 0 0 3px;
    }

    .view-btn:last-child {
      border-radius: 0 3px 3px 0;
    }

    .view-btn + .view-btn {
      border-left: none;
    }

    .view-btn.active {
      background: var(--color-maize);
      color: var(--color-navy-darkest);
      border-color: var(--color-maize);
      font-weight: 600;
    }

    .view-btn:hover:not(.active) {
      background: var(--color-navy-mid);
      color: var(--color-gray-light);
    }

    /* Keep adjacent borders clean when active is next to inactive */
    .view-btn.active + .view-btn {
      border-left: 1px solid var(--color-navy-light);
    }

    /* =========================================================================
       Empty states
       ========================================================================= */
    .empty-state {
      font-family: var(--font-sans);
      font-size: 12px;
      font-style: italic;
      color: var(--color-gray-mid);
      text-align: center;
      user-select: none;
      pointer-events: none;
    }

    /* =========================================================================
       Status bar
       ========================================================================= */
    #status-bar {
      height: 28px;
      flex-shrink: 0;
      background: var(--color-navy-darkest);
      border-top: 1px solid var(--color-navy-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
    }

    .status-left,
    .status-right {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .status-divider {
      width: 1px;
      height: 12px;
      background: var(--color-gray-dark);
      margin: 0 14px;
      flex-shrink: 0;
    }

    .status-item {
      font-size: 11px;
      white-space: nowrap;
    }

    .status-repo {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--color-maize);
      font-weight: 500;
    }

    .status-branch {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--color-white-dim);
    }

    .status-sha {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--color-gray-mid);
    }

    .status-collected {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-gray-mid);
    }

    /* Hook status */
    .status-right {
      gap: 12px;
    }

    .hook-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hook-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .hook-dot.active   { background: var(--color-green-bright); }
    .hook-dot.inactive { background: var(--color-gray-dark); }

    .hook-label {
      font-family: var(--font-sans);
      font-size: 11px;
    }

    .hook-label.active   { color: var(--color-green-bright); }
    .hook-label.inactive { color: var(--color-gray-mid); }

    /* Collect now button */
    .collect-btn {
      height: 20px;
      background: var(--color-navy-dark);
      color: var(--color-maize);
      border: 1px solid var(--color-maize-dim);
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 0 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s;
    }

    .collect-btn:hover {
      background: var(--color-maize-dark);
      border-color: var(--color-maize);
    }

    /* =========================================================================
       Drag-active state — prevent text selection across the whole page
       ========================================================================= */
    body.dragging {
      user-select: none;
      -webkit-user-select: none;
    }

    /* =========================================================================
       File list — phase two
       ========================================================================= */
    #file-list-scroll {
      flex: 1;
      align-self: stretch;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 4px 0;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px 4px;
      cursor: pointer;
      user-select: none;
    }

    .group-header:hover .group-label {
      color: var(--color-gray-light);
    }

    .group-chevron {
      font-size: 9px;
      color: var(--color-gray-dark);
      flex-shrink: 0;
      width: 10px;
      text-align: center;
    }

    .group-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-gray-mid);
      letter-spacing: 0.03em;
      border-left: 2px dashed var(--color-gray-dark);
      padding-left: 6px;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 10px 3px 22px;
      cursor: pointer;
      gap: 8px;
    }

    .file-row:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .file-row.selected {
      background: var(--color-maize-dark);
    }

    .file-row-left {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      flex: 1;
    }

    .health-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .health-dot.green { background: var(--color-green-bright); }
    .health-dot.amber { background: var(--color-amber); }
    .health-dot.red   { background: var(--color-red-bright); }

    .file-name {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--color-white-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-row.selected .file-name {
      color: var(--color-maize);
    }

    .file-signal {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-gray-dark);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .file-row.selected .file-signal {
      color: var(--color-maize-dim);
    }

    /* =========================================================================
       Detail panel — phase two
       ========================================================================= */
    .detail-file-header {
      padding: 16px;
      border-bottom: 1px solid var(--color-navy-light);
      width: 100%;
      align-self: flex-start;
    }

    .detail-file-name {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--color-maize);
      margin-bottom: 4px;
    }

    .detail-file-path {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--color-gray-mid);
      word-break: break-all;
    }

  </style>
</head>
<body>

<div id="app">

  <!-- =========================================================================
       Title bar
       ========================================================================= -->
  <div id="title-bar">
    <span class="wordmark">zabean</span>
  </div>

  <!-- =========================================================================
       Workspace
       ========================================================================= -->
  <div id="workspace">

    <!-- Top panel -->
    <div id="top-panel" class="panel">
      <div class="panel-header">
        <span class="panel-title">dependency graph</span>
        <div class="view-mode-selector" role="group" aria-label="View mode">
          <button class="view-btn active" data-mode="dependency">dependency</button>
          <button class="view-btn"        data-mode="contributors">contributors</button>
          <button class="view-btn"        data-mode="health">health</button>
          <button class="view-btn"        data-mode="structure">structure</button>
        </div>
      </div>
      <div class="panel-body">
        <span class="empty-state">graph renders here</span>
      </div>
    </div>

    <!-- Horizontal resize bar -->
    <div id="h-resize" class="resize-bar resize-h" title="drag to resize · double-click to reset"></div>

    <!-- Bottom area -->
    <div id="bottom-area">

      <!-- Bottom left: file list -->
      <div id="bottom-left" class="panel">
        <div class="panel-header">
          <span class="panel-title">files</span>
          <input
            id="search-input"
            class="search-input"
            type="text"
            placeholder="filter files…"
            aria-label="Filter files"
          >
        </div>
        <div class="panel-body">
          <div id="file-list-scroll"></div>
        </div>
      </div>

      <!-- Vertical resize bar -->
      <div id="v-resize" class="resize-bar resize-v" title="drag to resize · double-click to reset"></div>

      <!-- Bottom right: detail -->
      <div id="bottom-right" class="panel">
        <div class="panel-header">
          <span class="panel-title">detail</span>
        </div>
        <div class="panel-body" id="bottom-right-body">
          <span class="empty-state" id="detail-empty">select a file to explore its dependencies</span>
        </div>
      </div>

    </div>
    <!-- /bottom-area -->

  </div>
  <!-- /workspace -->

  <!-- =========================================================================
       Status bar
       ========================================================================= -->
  <div id="status-bar">

    <div class="status-left">
      <span class="status-repo">zabean</span>
      <div class="status-divider"></div>
      <span class="status-branch">main</span>
      <div class="status-divider"></div>
      <span class="status-sha">—</span>
      <div class="status-divider"></div>
      <span class="status-collected">last collected —</span>
    </div>

    <div class="status-right">
      <div class="hook-status">
        <span class="hook-dot inactive"></span>
        <span class="hook-label inactive">hook inactive</span>
      </div>
      <button class="collect-btn" title="Trigger a ground truth collection">collect now</button>
    </div>

  </div>
  <!-- /status-bar -->

</div>
<!-- /app -->

<script>
  // ===========================================================================
  // Layout — resizable panels
  // ===========================================================================

  const DEFAULT_TOP    = 0.45;   // fraction of workspace height
  const DEFAULT_LEFT   = 0.35;   // fraction of bottom-area width
  const MIN_FRACTION   = 0.15;
  const MAX_FRACTION   = 0.85;
  const H_BAR_PX       = 4;
  const V_BAR_PX       = 4;

  let topFraction  = DEFAULT_TOP;
  let leftFraction = DEFAULT_LEFT;

  const workspace   = document.getElementById('workspace');
  const topPanel    = document.getElementById('top-panel');
  const bottomArea  = document.getElementById('bottom-area');
  const bottomLeft  = document.getElementById('bottom-left');
  const hResize     = document.getElementById('h-resize');
  const vResize     = document.getElementById('v-resize');

  function applyLayout() {
    // Horizontal split
    const wh   = workspace.clientHeight;
    const topH = Math.round((wh - H_BAR_PX) * topFraction);
    topPanel.style.flex = `0 0 ${topH}px`;

    // Vertical split — measured after the horizontal split settles
    requestAnimationFrame(() => {
      const bw    = bottomArea.clientWidth;
      const leftW = Math.round((bw - V_BAR_PX) * leftFraction);
      bottomLeft.style.flex = `0 0 ${leftW}px`;
    });
  }

  // ---------------------------------------------------------------------------
  // Drag machinery
  // ---------------------------------------------------------------------------

  let dragging = null; // 'h' | 'v' | null

  function startDrag(axis, e) {
    dragging = axis;
    document.body.classList.add('dragging');
    document.body.style.cursor = axis === 'h' ? 'row-resize' : 'col-resize';
    hResize.classList.toggle('dragging', axis === 'h');
    vResize.classList.toggle('dragging', axis === 'v');
    e.preventDefault();
  }

  hResize.addEventListener('mousedown', e => startDrag('h', e));
  vResize.addEventListener('mousedown', e => startDrag('v', e));

  document.addEventListener('mousemove', e => {
    if (!dragging) return;

    if (dragging === 'h') {
      const rect = workspace.getBoundingClientRect();
      const raw  = (e.clientY - rect.top) / rect.height;
      topFraction = Math.min(Math.max(raw, MIN_FRACTION), MAX_FRACTION);
    } else {
      const rect  = bottomArea.getBoundingClientRect();
      const raw   = (e.clientX - rect.left) / rect.width;
      leftFraction = Math.min(Math.max(raw, MIN_FRACTION), MAX_FRACTION);
    }

    applyLayout();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = null;
    document.body.classList.remove('dragging');
    document.body.style.cursor = '';
    hResize.classList.remove('dragging');
    vResize.classList.remove('dragging');
  });

  // Double-click to reset
  hResize.addEventListener('dblclick', () => {
    topFraction = DEFAULT_TOP;
    applyLayout();
  });

  vResize.addEventListener('dblclick', () => {
    leftFraction = DEFAULT_LEFT;
    applyLayout();
  });

  // Re-apply on window resize
  window.addEventListener('resize', applyLayout);

  // Initial layout
  applyLayout();

  // ===========================================================================
  // Constants shared across phases
  // ===========================================================================

  const EMPTY_STATE_TEXT = {
    dependency:   'select a file to explore its dependencies',
    contributors: 'select a file to explore its contributors',
    health:       'select a file to review its health signals',
    structure:    'select a file to explore its structure',
  };

  const viewBtns = document.querySelectorAll('.view-btn');

  // ===========================================================================
  // Phase two — state, file list, selection, search, status bar
  // ===========================================================================

  const state = {
    data:         null,   // API response: { repo, files, collected_at, commit_sha }
    selectedPath: null,
    mode:         'dependency',
    query:        '',
    collapsed:    new Set(),
  };

  // DOM refs
  const fileListScroll  = document.getElementById('file-list-scroll');
  const searchInput     = document.getElementById('search-input');
  const bottomRightBody = document.getElementById('bottom-right-body');
  const statusRepo      = document.querySelector('.status-repo');
  const statusBranch    = document.querySelector('.status-branch');
  const statusSha       = document.querySelector('.status-sha');
  const statusCollected = document.querySelector('.status-collected');

  // ---------------------------------------------------------------------------
  // View mode — updates active class, state.mode, and re-renders
  // ---------------------------------------------------------------------------

  viewBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      viewBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
      if (state.data) {
        renderFileList();
        updateDetailPanel();
      } else {
        // No data yet — just update the top panel title
        const el = document.getElementById('detail-empty');
        if (el) el.textContent = EMPTY_STATE_TEXT[btn.dataset.mode];
      }
    });
  });

  // ---------------------------------------------------------------------------
  // Boot — fetch ground truth from serve.py
  // ---------------------------------------------------------------------------

  async function init() {
    try {
      const res = await fetch('/api/ground-truth');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      state.data = await res.json();
      updateStatusBarFromData();
      renderFileList();
    } catch (_err) {
      fileListScroll.innerHTML =
        `<div style="padding:12px 10px;font-size:11px;` +
        `color:var(--color-amber);font-family:var(--font-mono);">` +
        `could not load ground truth — is serve.py running?</div>`;
    }
  }

  // ---------------------------------------------------------------------------
  // Status bar
  // ---------------------------------------------------------------------------

  function updateStatusBarFromData() {
    const { repo, collected_at } = state.data;
    const repoName = (repo.repo_id || '').split('/').pop() || 'zabean';
    statusRepo.textContent      = repoName;
    statusBranch.textContent    = repo.branch || '—';
    statusSha.textContent       = (repo.commit_sha || '').slice(0, 7) || '—';
    // collected_at is resolved by serve.py from repo.fetched_at
    statusCollected.textContent = formatRelativeTime(collected_at || repo.fetched_at);
  }

  function formatRelativeTime(iso) {
    if (!iso) return 'last collected —';
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60)    return 'collected just now';
    if (diff < 3600)  return `collected ${Math.round(diff / 60)}m ago`;
    if (diff < 86400) return `collected ${Math.round(diff / 3600)}h ago`;
    return `collected ${Math.round(diff / 86400)}d ago`;
  }

  // ---------------------------------------------------------------------------
  // File list rendering
  // ---------------------------------------------------------------------------

  function getSignal(fgt) {
    // FileGroundTruth.to_dict() serialises to flat fields — no nesting.
    switch (state.mode) {
      case 'dependency':
        return (fgt.imports_internal?.length ?? 0) + ' deps';
      case 'contributors':
        return (fgt.commit_frequency_30d ?? 0) + ' commits';
      case 'health':
        return (fgt.could_not_determine?.length ?? 0) + ' unknowns';
      case 'structure':
        return (fgt.line_count ?? 0) + ' lines';
      default:
        return '';
    }
  }

  function getHealthClass(fgt) {
    const n = fgt.could_not_determine?.length ?? 0;
    if (n === 0) return 'green';
    if (n <= 3)  return 'amber';
    return 'red';
  }

  function sortFiles(files) {
    const f = [...files];
    switch (state.mode) {
      case 'dependency':
        return f.sort((a, b) =>
          (b.imports_internal?.length ?? 0) -
          (a.imports_internal?.length ?? 0));
      case 'contributors':
        return f.sort((a, b) =>
          (b.commit_frequency_30d ?? 0) -
          (a.commit_frequency_30d ?? 0));
      case 'health':
        return f.sort((a, b) =>
          (b.could_not_determine?.length ?? 0) -
          (a.could_not_determine?.length ?? 0));
      case 'structure':
      default:
        return f.sort((a, b) => a.file_path.localeCompare(b.file_path));
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function renderFileList() {
    if (!state.data) return;

    const q = state.query.toLowerCase();

    // Filter
    const filtered = q
      ? state.data.files.filter(f => f.file_path.toLowerCase().includes(q))
      : state.data.files;

    // Group by directory
    const groups = new Map();
    for (const fgt of filtered) {
      const parts = fgt.file_path.split('/');
      const dir   = parts.length > 1 ? parts.slice(0, -1).join('/') : '.';
      if (!groups.has(dir)) groups.set(dir, []);
      groups.get(dir).push(fgt);
    }

    // Sort files within each group by current mode
    for (const [dir, files] of groups) {
      groups.set(dir, sortFiles(files));
    }

    // Sort directories alphabetically
    const sortedDirs = [...groups.keys()].sort();

    // Build DOM fragment
    const frag = document.createDocumentFragment();

    if (sortedDirs.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.style.cssText = 'padding: 24px; pointer-events: none;';
      empty.textContent = q ? 'no files match' : 'no files collected yet';
      frag.appendChild(empty);
    }

    for (const dir of sortedDirs) {
      const files       = groups.get(dir);
      const isCollapsed = state.collapsed.has(dir);

      // Group header
      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML =
        `<span class="group-chevron">${isCollapsed ? '›' : '⌄'}</span>` +
        `<span class="group-label">${escHtml(dir)}</span>`;
      header.addEventListener('click', () => toggleGroup(dir));
      frag.appendChild(header);

      if (isCollapsed) continue;

      // File rows
      for (const fgt of files) {
        const basename   = fgt.file_path.split('/').pop();
        const health     = getHealthClass(fgt);
        const signal     = getSignal(fgt);
        const isSelected = fgt.file_path === state.selectedPath;

        const row = document.createElement('div');
        row.className = 'file-row' + (isSelected ? ' selected' : '');
        row.innerHTML =
          `<div class="file-row-left">` +
          `  <span class="health-dot ${health}"></span>` +
          `  <span class="file-name">${escHtml(basename)}</span>` +
          `</div>` +
          `<span class="file-signal">${escHtml(signal)}</span>`;
        row.addEventListener('click', () => selectFile(fgt.file_path));
        frag.appendChild(row);
      }
    }

    fileListScroll.innerHTML = '';
    fileListScroll.appendChild(frag);
  }

  // ---------------------------------------------------------------------------
  // Selection
  // ---------------------------------------------------------------------------

  function selectFile(path) {
    // Clicking the already-selected file deselects it
    state.selectedPath = (state.selectedPath === path) ? null : path;
    renderFileList();
    updateDetailPanel();

    // Status bar SHA: show file's last commit when selected, repo SHA otherwise
    if (state.selectedPath && state.data) {
      const fgt = state.data.files.find(f => f.file_path === state.selectedPath);
      // Flat field name: most_recent_commit_sha (not contributor_signals.last_commit_sha)
      const sha = fgt?.most_recent_commit_sha;
      statusSha.textContent = sha ? sha.slice(0, 7) : (state.data.repo.commit_sha || '').slice(0, 7) || '—';
    } else if (state.data) {
      statusSha.textContent = (state.data.repo.commit_sha || '').slice(0, 7) || '—';
    }
  }

  // ---------------------------------------------------------------------------
  // Detail panel
  // ---------------------------------------------------------------------------

  function updateDetailPanel() {
    if (!state.selectedPath || !state.data) {
      bottomRightBody.innerHTML =
        `<span class="empty-state" id="detail-empty">` +
        escHtml(EMPTY_STATE_TEXT[state.mode]) +
        `</span>`;
      return;
    }

    const fgt = state.data.files.find(f => f.file_path === state.selectedPath);
    if (!fgt) {
      bottomRightBody.innerHTML =
        `<span class="empty-state" id="detail-empty">` +
        escHtml(EMPTY_STATE_TEXT[state.mode]) +
        `</span>`;
      return;
    }

    const basename = fgt.file_path.split('/').pop();
    bottomRightBody.innerHTML =
      `<div class="detail-file-header">` +
      `  <div class="detail-file-name">${escHtml(basename)}</div>` +
      `  <div class="detail-file-path">${escHtml(fgt.file_path)}</div>` +
      `</div>`;
  }

  // ---------------------------------------------------------------------------
  // Group collapse / expand
  // ---------------------------------------------------------------------------

  function toggleGroup(dir) {
    if (state.collapsed.has(dir)) state.collapsed.delete(dir);
    else state.collapsed.add(dir);
    renderFileList();
  }

  // ---------------------------------------------------------------------------
  // Search — real-time filter; / focuses, Escape clears
  // ---------------------------------------------------------------------------

  searchInput.addEventListener('input', () => {
    state.query = searchInput.value;
    renderFileList();
  });

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
    }
    if (e.key === 'Escape' && document.activeElement === searchInput) {
      searchInput.value = '';
      state.query = '';
      searchInput.blur();
      renderFileList();
    }
  });

  // ---------------------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------------------

  init();

</script>
</body>
</html>
